<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover + dynamic viewport units handle the iOS Safari URL bar and notch
         (docs/compatibility.md §3). user-scalable=no suppresses double-tap zoom on the canvas. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>One Ruble Per Drone</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100vh; /* fallback */
        height: 100dvh; /* dynamic viewport — survives iOS URL-bar show/hide */
        background: #000;
        overflow: hidden;
        /* Gesture hygiene: suppress scroll, text selection, and the long-press callout. */
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
      }
      #app {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Keep the letterbox clear of the notch / home indicator. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }
      #game {
        display: block;
        /* Crisp pixel-art upscale. Multiple declarations — each browser uses the last it
           understands (docs/compatibility.md §2). */
        image-rendering: -moz-crisp-edges;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      /* The Three.js in-game scene renders here at the device's native resolution (§request:
         iPhone 17 = 2622×1206). Fills the viewport; shown only while Playing, above the 2D canvas. */
      #game3d {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: none;
        z-index: 1;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      /* DOM HUD + resident-interaction overlay over the 3D world (crisp text at native resolution). */
      #hud {
        position: fixed;
        inset: 0;
        display: none;
        z-index: 2;
        pointer-events: none;
      }
      /* Shown by the scaler when the device is in portrait (orientation lock is unavailable
         on iOS Safari — we prompt, we cannot force; docs/compatibility.md §3). */
      #rotate-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: #1a1c2c;
        color: #fff6e6;
        font-family: monospace;
        font-size: 1.25rem;
        text-align: center;
        padding: 2rem;
        z-index: 10;
      }
      #rotate-overlay[data-visible='true'] {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" width="384" height="216"></canvas>
    </div>
    <canvas id="game3d"></canvas>
    <div id="hud"></div>
    <div id="rotate-overlay" aria-hidden="true">Please rotate your device to landscape ☺</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
